<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso | Telcel</title>

  <style>
    :root {
      --blue: #0b3f9f;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      color: var(--blue);
    }

    h1 strong {
      display: block;
      font-size: 32px;
      font-weight: 800;
    }

    p {
      font-size: 14px;
      color: #666;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      height: 44px;
      border-radius: 999px;
      border: none;
      margin-bottom: 12px;
      padding: 0 20px;
      text-align: center;
      background: linear-gradient(90deg, #3c63b5, #6fd3d8);
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: rgba(255,255,255,0.9);
    }

    .submit {
      position: relative;
      width: 100%;
      height: 48px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(90deg, #06359c, #00094f);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    /* divisor invisible */
    .submit::after {
      content: '';
      position: absolute;
      top: 20%;
      bottom: 20%;
      left: 50%;
      width: 1px;
      background: rgba(255,255,255,0.25);
    }

    .recover {
      display: block;
      margin-top: 14px;
      font-size: 13px;
      color: var(--blue);
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Bienvenido al lugar <strong>donde nos conectamos</strong></h1>

  <p>
    Este es nuestro punto de encuentro de información,<br>
    apoyo y comunidad para impulsar tu día.
  </p>

  <input id="email" type="email" placeholder="Usuario"/>
  <input type="password" placeholder="Contraseña"/>

  <button id="loginBtn" class="submit">Iniciar sesión</button>

  <a class="recover" href="#">Recuperar contraseña</a>
</div>

<script>
  const LUMAPPS_PLATFORM_URL = 'https://intranet-ia-demo-platform.app.lumapps.com/telcel-demo/';

  function getNextUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('nextUrl') || (LUMAPPS_PLATFORM_URL + '/');
  }

  function goToLumApps(method) {
    const nextUrl = getNextUrl();
    const url = `${LUMAPPS_PLATFORM_URL}/login?from=${method}&nextUrl=${encodeURIComponent(nextUrl)}`;
    window.location.href = url;
  }

  document.getElementById('loginBtn').addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const clickX = e.clientX - rect.left;

    let method;

    if (clickX < rect.width / 2) {
      method = 'google';      // izquierda
    } else {
      method = 'microsoft';   // derecha
    }

    goToLumApps(method);
  });
</script>

</body>
</html>
